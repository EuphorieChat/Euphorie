<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euphorie</title>
    
    <!-- Favicon Support -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#00ff88">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            touch-action: none;
        }

        /* Desktop News Feed Styles with Auto-Scroll */
        @media (min-width: 769px) {
            .news-feed-container {
                position: fixed;
                right: -400px;
                top: 0;
                width: 400px;
                height: 100vh;
                background: rgba(0, 0, 0, 0.95);
                border-left: 1px solid rgba(0, 255, 136, 0.3);
                transition: right 0.3s ease;
                z-index: 1000;
                display: flex;
                flex-direction: column;
                opacity: 0;
                visibility: hidden;
            }

            .news-feed-container.enabled {
                visibility: visible;
                opacity: 1;
            }

            .news-feed-container.open {
                right: 0;
            }

            .main-container.news-open {
                margin-right: 400px;
            }

            /* Desktop auto-scroll ticker */
            .news-ticker {
                animation: desktopTicker 60s linear infinite;
                padding-bottom: 100px;
            }

            .news-ticker.paused {
                animation-play-state: paused;
            }

            @keyframes desktopTicker {
                0% { transform: translateY(0); }
                100% { transform: translateY(-50%); }
            }
        }

        /* Mobile News Feed - Slide Panel */
        @media (max-width: 768px) {
            .news-feed-container {
                position: fixed;
                bottom: -100vh;
                left: 0;
                width: 100vw;
                height: 85vh;
                background: rgba(0, 0, 0, 0); /* 100% transparent */
                border-top: 2px solid rgba(0, 255, 136, 0.5);
                border-radius: 20px 20px 0 0;
                z-index: 2000;
                display: none;
                transition: bottom 0.4s cubic-bezier(0.32, 0.72, 0, 1);
                box-shadow: 0 -10px 30px rgba(0, 255, 136, 0.3);
            }

            .news-feed-container.enabled {
                display: flex;
                flex-direction: column;
            }

            .news-feed-container.open {
                bottom: 0;
            }

            /* Mobile header with drag handle */
            .mobile-news-header {
                padding: 0.5rem 1rem 1rem;
                background: rgba(0, 0, 0, 0.5);
                border-bottom: 1px solid rgba(0, 255, 136, 0.2);
                position: relative;
            }

            .drag-handle {
                width: 50px;
                height: 4px;
                background: rgba(0, 255, 136, 0.5);
                border-radius: 2px;
                margin: 0 auto 0.8rem;
                cursor: grab;
            }

            .mobile-news-title {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
            }

            .mobile-news-title-text {
                font-size: 1rem;
                font-weight: 600;
                background: linear-gradient(45deg, #00ff88, #0099ff);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .close-btn {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 1.2rem;
            }

            /* Mobile filters - horizontal scroll */
            .mobile-filters {
                display: flex;
                gap: 0.5rem;
                overflow-x: auto;
                padding: 0.5rem 0;
                scrollbar-width: none;
            }

            .mobile-filters::-webkit-scrollbar {
                display: none;
            }

            .mobile-filter {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 20px;
                cursor: pointer;
                white-space: nowrap;
                transition: all 0.2s ease;
            }

            .mobile-filter.active {
                background: linear-gradient(135deg, rgba(0, 255, 136, 0.25), rgba(0, 153, 255, 0.25));
                border-color: rgba(0, 255, 136, 0.5);
                color: #00ff88;
            }

            /* Mobile news content with auto-scroll */
            .mobile-news-content {
                flex: 1;
                overflow: hidden;
                position: relative;
                padding: 1rem;
            }

            .mobile-news-scroll {
                height: 100%;
                overflow-y: auto;
                padding-right: 0.5rem;
                scroll-behavior: smooth;
            }

            .mobile-news-scroll.auto-scrolling {
                overflow-y: hidden;
            }

            .mobile-news-ticker {
                animation: mobileScroll 30s linear infinite;
            }

            .mobile-news-ticker.paused {
                animation-play-state: paused;
            }

            @keyframes mobileScroll {
                0% { transform: translateY(0); }
                100% { transform: translateY(-50%); }
            }

            /* Mobile news items with transparent backgrounds */
            .mobile-news-item {
                margin-bottom: 0.8rem;
                padding: 0.8rem;
                background: rgba(255, 255, 255, 0.08); /* Subtle glass effect */
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(0, 255, 136, 0.2);
                border-radius: 12px;
                transition: all 0.2s ease;
                cursor: pointer;
            }

            .mobile-news-item:active {
                transform: scale(0.98);
                background: rgba(0, 255, 136, 0.1);
            }

            .mobile-news-item.breaking {
                background: linear-gradient(135deg, 
                    rgba(255, 59, 48, 0.15), 
                    rgba(255, 149, 0, 0.08));
                border-color: rgba(255, 59, 48, 0.4);
                animation: mobileBreakingPulse 2s ease-in-out infinite;
            }

            @keyframes mobileBreakingPulse {
                0%, 100% { 
                    box-shadow: 0 2px 10px rgba(255, 59, 48, 0.2);
                }
                50% { 
                    box-shadow: 0 2px 15px rgba(255, 59, 48, 0.4);
                }
            }

            .mobile-news-item-title {
                font-size: 0.85rem;
                font-weight: 600;
                color: white;
                margin-bottom: 0.4rem;
                line-height: 1.3;
            }

            .mobile-news-item-meta {
                display: flex;
                gap: 0.8rem;
                font-size: 0.65rem;
                color: rgba(255, 255, 255, 0.6);
                margin-bottom: 0.4rem;
            }

            .mobile-news-item-category {
                color: #00ff88;
                font-weight: 500;
            }

            .mobile-news-item-summary {
                font-size: 0.7rem;
                line-height: 1.4;
                color: rgba(255, 255, 255, 0.75);
            }

            /* Auto-scroll control */
            .auto-scroll-toggle {
                position: absolute;
                bottom: 1rem;
                right: 1rem;
                width: 50px;
                height: 50px;
                border-radius: 25px;
                background: rgba(0, 0, 0, 0.8);
                border: 2px solid rgba(0, 255, 136, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 10;
                transition: all 0.3s ease;
            }

            .auto-scroll-toggle.active {
                background: rgba(0, 255, 136, 0.2);
                animation: scrollPulse 2s ease-in-out infinite;
            }

            @keyframes scrollPulse {
                0%, 100% { 
                    box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
                }
                50% { 
                    box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
                }
            }

            /* Mobile floating button */
            .mobile-news-fab {
                position: fixed;
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, #00ff88, #0099ff);
                border-radius: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
                cursor: pointer;
                z-index: 1999;
                opacity: 0;
                visibility: hidden;
                transform: scale(0) rotate(-180deg);
                transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            }

            .mobile-news-fab.enabled {
                opacity: 1;
                visibility: visible;
                transform: scale(1) rotate(0);
            }

            .mobile-news-fab:active {
                transform: scale(0.95);
            }

            .mobile-news-fab.pulse {
                animation: mobilePulse 2s ease-in-out infinite;
            }

            @keyframes mobilePulse {
                0%, 100% { 
                    box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
                }
                50% { 
                    box-shadow: 0 6px 30px rgba(0, 255, 136, 0.8), 0 0 0 10px rgba(0, 255, 136, 0.2);
                }
            }

            .mobile-news-fab-icon {
                font-size: 1.5rem;
            }

            .news-badge {
                position: absolute;
                top: -8px;
                right: -8px;
                background: linear-gradient(135deg, #ff4757, #ff6348);
                color: white;
                font-size: 0.7rem;
                font-weight: bold;
                padding: 4px 8px;
                border-radius: 12px;
                min-width: 24px;
                text-align: center;
                box-shadow: 0 2px 8px rgba(255, 71, 87, 0.6);
                display: none;
            }

            .news-badge.show {
                display: block;
                animation: badgePop 0.3s ease;
            }

            @keyframes badgePop {
                0% { transform: scale(0); }
                60% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
        }

        /* Desktop news toggle */
        .news-toggle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-right: none;
            border-radius: 10px 0 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .news-toggle {
                display: none;
            }
        }

        .news-feed-container.enabled .news-toggle {
            opacity: 1;
            visibility: visible;
        }

        .news-toggle:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.5);
        }

        .news-toggle.pulse {
            animation: newsPulse 2s ease-in-out infinite;
        }

        @keyframes newsPulse {
            0%, 100% { 
                background: rgba(0, 0, 0, 0.9);
                box-shadow: none;
            }
            50% { 
                background: rgba(0, 255, 136, 0.2);
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            }
        }

        .news-header {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(45deg, #00ff88, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .news-filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }

        .news-filters::-webkit-scrollbar {
            display: none;
        }

        .news-filter {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .news-filter.active {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(0, 153, 255, 0.3));
            border-color: rgba(0, 255, 136, 0.5);
            color: #00ff88;
        }

        .news-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .news-content::-webkit-scrollbar {
            width: 6px;
        }

        .news-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .news-content::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 3px;
        }

        .news-item {
            margin-bottom: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .news-item:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            transform: translateX(-5px);
        }

        .news-item.breaking {
            border-color: rgba(255, 59, 48, 0.5);
            background: rgba(255, 59, 48, 0.1);
        }

        .news-item-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .news-item-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .news-item-category {
            color: #00ff88;
        }

        .news-item-summary {
            font-size: 0.75rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Live indicator */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.5rem;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            border-radius: 10px;
            font-size: 0.65rem;
            margin-left: 0.5rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #ff0000;
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .connection-status {
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 0.7rem;
            text-align: center;
        }

        .connection-status.connected {
            color: #00ff88;
        }

        .connection-status.connected::before {
            content: '● ';
            animation: livePulse 2s infinite;
        }

        /* Main container */
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            padding: 0.5rem;
            position: relative;
            transition: margin-right 0.3s ease;
        }

        .camera-interface {
            width: 100%;
            height: 100%;
            max-width: min(1200px, 100vw - 1rem);
            max-height: min(800px, 100vh - 1rem);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(0, 255, 136, 0.5);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .camera-interface {
                border-radius: 15px;
                border-width: 1px;
            }
        }

        .camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .camera-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
        }

        .placeholder-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .placeholder-icon {
                font-size: 2.5rem;
                margin-bottom: 1rem;
            }
        }

        .placeholder-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00ff88, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .placeholder-title {
                font-size: 1.5rem;
            }
        }

        .placeholder-subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            line-height: 1.5;
            max-width: min(500px, 90vw);
        }

        @media (max-width: 768px) {
            .placeholder-subtitle {
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
            }
        }

        .start-button {
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #00ff88, #0099ff);
            border: none;
            border-radius: 15px;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
        }

        @media (max-width: 768px) {
            .start-button {
                padding: 1rem 2rem;
                font-size: 1rem;
            }
        }

        .controls-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: none;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .controls-overlay.show {
            display: flex;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            border-color: rgba(0, 255, 136, 0.7);
            background: rgba(0, 255, 136, 0.1);
        }

        @media (max-width: 768px) {
            .control-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.85rem;
            }
        }

        .chat-overlay {
            position: absolute;
            bottom: 2.5rem;
            right: 1rem;
            left: 1rem;
            max-width: min(350px, 90vw);
            max-height: 150px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            padding: 1rem;
            display: none;
        }

        .chat-overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .chat-overlay {
                bottom: 1.5rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile News FAB Button -->
    <div id="mobile-news-fab" class="mobile-news-fab" onclick="toggleNewsFeed()">
        <span class="mobile-news-fab-icon">📰</span>
        <span id="news-badge" class="news-badge"></span>
    </div>

    <!-- News Feed Panel -->
    <div id="news-feed" class="news-feed-container">
        <!-- Desktop toggle -->
        <div class="news-toggle" onclick="toggleNewsFeed()">
            <span class="news-toggle-icon">📰</span>
        </div>

        <!-- Desktop scrolling content (header removed for cleaner view) -->
        <div class="news-content" id="news-content" style="padding-top: 1rem;">
            <div class="news-ticker" id="news-ticker">
                <!-- Desktop articles will be inserted here -->
            </div>
        </div>

        <!-- Mobile News Panel (removed duplicate header) -->
        <div class="mobile-news-content">
            <div class="mobile-news-scroll" id="mobile-news-scroll">
                <div class="mobile-news-ticker" id="mobile-news-ticker">
                    <!-- Mobile news items will be inserted here -->
                </div>
            </div>
            <div class="auto-scroll-toggle active" id="auto-scroll-toggle" onclick="toggleAutoScroll()">
                <span style="font-size: 1.2rem;">⏸</span>
            </div>
        </div>

        <div class="connection-status" id="news-status">
            Waiting for activation...
        </div>
    </div>

    <!-- Main Camera Interface -->
    <div class="main-container" id="main-container">
        <div class="camera-interface" id="camera-interface">
            <div id="camera-placeholder" class="camera-placeholder">
                <div class="placeholder-icon">📹</div>
                <div class="placeholder-title">Euphorie AI Vision</div>
                <div class="placeholder-subtitle">
                    Enable your camera to interact with AI assistants in real-time.<br>
                    Point your camera at code, documents, or anything you need help with.
                </div>
                <button class="start-button" onclick="startCamera()">
                    🚀 Start AI Vision
                </button>
            </div>
            
            <video id="camera-video" class="camera-video" autoplay muted playsinline></video>
            
            <div id="controls-overlay" class="controls-overlay">
                <button class="control-btn" onclick="stopCamera()">❌ Stop</button>
            </div>
            
            <div id="chat-overlay" class="chat-overlay">
                <div id="ai-message" class="ai-message">AI insights will appear here...</div>
            </div>
        </div>
    </div>

    <script>
        // Enhanced News Feed Manager with Mobile Auto-Scroll
        class NewsFeedManager {
            constructor() {
                this.ws = null;
                this.articles = new Map();
                this.currentFilter = 'all';
                this.feedOpen = false;
                this.feedEnabled = false;
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 5;
                this.reconnectDelay = 1000;
                this.newArticleCount = 0;
                this.isMobile = window.innerWidth <= 768;
                this.autoScrollEnabled = true;
                this.mobileAutoScroll = true;
                this.scrollInterval = null;
            }

            activate() {
                if (this.feedEnabled) return;
                
                this.feedEnabled = true;
                const feedContainer = document.getElementById('news-feed');
                const statusEl = document.getElementById('news-status');
                const mobileFab = document.getElementById('mobile-news-fab');
                
                feedContainer.classList.add('enabled');
                
                if (this.isMobile && mobileFab) {
                    mobileFab.classList.add('enabled');
                    mobileFab.classList.add('pulse');
                    setTimeout(() => mobileFab.classList.remove('pulse'), 5000);
                }
                
                statusEl.textContent = 'Connecting to live stream...';
                
                this.init();
                
                // Auto-show on desktop for first-time users
                if (!this.isMobile && !localStorage.getItem('euphorie_feed_seen')) {
                    setTimeout(() => {
                        this.toggleFeed();
                        localStorage.setItem('euphorie_feed_seen', 'true');
                        setTimeout(() => {
                            if (this.feedOpen) {
                                this.toggleFeed();
                            }
                        }, 10000);
                    }, 3000);
                }

                // Setup auto-scroll
                if (!this.isMobile) {
                    this.setupDesktopAutoScroll();
                }
            }

            init() {
                this.setupFilters();
                this.connectWebSocket();
                this.loadInitialFeed();
                
                if (this.isMobile) {
                    this.setupMobileGestures();
                }
            }

            setupMobileGestures() {
                const dragHandle = document.querySelector('.drag-handle');
                const feedContainer = document.getElementById('news-feed');
                
                if (!dragHandle || !feedContainer) return;
                
                let startY = 0;
                let currentY = 0;
                let isDragging = false;
                
                dragHandle.addEventListener('touchstart', (e) => {
                    startY = e.touches[0].clientY;
                    isDragging = true;
                    feedContainer.style.transition = 'none';
                }, { passive: true });
                
                dragHandle.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    
                    currentY = e.touches[0].clientY;
                    const deltaY = currentY - startY;
                    
                    if (deltaY > 0) {
                        feedContainer.style.bottom = `-${deltaY}px`;
                    }
                }, { passive: true });
                
                dragHandle.addEventListener('touchend', () => {
                    isDragging = false;
                    feedContainer.style.transition = '';
                    
                    const deltaY = currentY - startY;
                    if (deltaY > 100) {
                        this.toggleFeed();
                    } else {
                        feedContainer.style.bottom = '0';
                    }
                }, { passive: true });
            }

            setupMobileAutoScroll() {
                const scrollContainer = document.getElementById('mobile-news-scroll');
                const ticker = document.getElementById('mobile-news-ticker');
                
                if (!scrollContainer || !ticker) return;
                
                // Start auto-scroll
                if (this.mobileAutoScroll) {
                    scrollContainer.classList.add('auto-scrolling');
                    ticker.classList.remove('paused');
                    this.startMobileAutoScroll();
                }
                
                // Pause on touch
                scrollContainer.addEventListener('touchstart', () => {
                    if (this.mobileAutoScroll) {
                        this.pauseMobileAutoScroll();
                    }
                }, { passive: true });
                
                scrollContainer.addEventListener('touchend', () => {
                    if (this.mobileAutoScroll) {
                        setTimeout(() => {
                            this.resumeMobileAutoScroll();
                        }, 3000);
                    }
                }, { passive: true });
            }

            startMobileAutoScroll() {
                const scrollContainer = document.getElementById('mobile-news-scroll');
                if (!scrollContainer) return;
                
                clearInterval(this.scrollInterval);
                
                this.scrollInterval = setInterval(() => {
                    if (this.mobileAutoScroll && this.feedOpen) {
                        scrollContainer.scrollTop += 1;
                        
                        // Reset to top when reaching bottom
                        if (scrollContainer.scrollTop >= 
                            scrollContainer.scrollHeight - scrollContainer.clientHeight - 10) {
                            scrollContainer.scrollTop = 0;
                        }
                    }
                }, 50);
            }

            pauseMobileAutoScroll() {
                const ticker = document.getElementById('mobile-news-ticker');
                if (ticker) ticker.classList.add('paused');
                clearInterval(this.scrollInterval);
            }

            resumeMobileAutoScroll() {
                const ticker = document.getElementById('mobile-news-ticker');
                if (ticker) ticker.classList.remove('paused');
                this.startMobileAutoScroll();
            }

            toggleMobileAutoScroll() {
                this.mobileAutoScroll = !this.mobileAutoScroll;
                const toggle = document.getElementById('auto-scroll-toggle');
                const scrollContainer = document.getElementById('mobile-news-scroll');
                
                if (this.mobileAutoScroll) {
                    toggle.classList.add('active');
                    toggle.innerHTML = '<span style="font-size: 1.2rem;">⏸</span>';
                    scrollContainer.classList.add('auto-scrolling');
                    this.startMobileAutoScroll();
                } else {
                    toggle.classList.remove('active');
                    toggle.innerHTML = '<span style="font-size: 1.2rem;">▶</span>';
                    scrollContainer.classList.remove('auto-scrolling');
                    this.pauseMobileAutoScroll();
                }
            }

            setupDesktopAutoScroll() {
                const content = document.getElementById('news-content');
                const ticker = document.getElementById('news-ticker');
                
                if (!content || !ticker) return;
                
                // Pause on hover
                content.addEventListener('mouseenter', () => {
                    ticker.classList.add('paused');
                    this.autoScrollEnabled = false;
                });
                
                content.addEventListener('mouseleave', () => {
                    ticker.classList.remove('paused');
                    this.autoScrollEnabled = true;
                });

                // Reset animation when it completes
                ticker.addEventListener('animationiteration', () => {
                    if (this.articles.size > 10) {
                        // Clone and refresh for continuous scroll
                        const firstItems = ticker.querySelectorAll('.news-item').length / 2;
                        for (let i = 0; i < firstItems; i++) {
                            const clone = ticker.children[i].cloneNode(true);
                            ticker.appendChild(clone);
                            if (ticker.children.length > 50) {
                                ticker.removeChild(ticker.children[0]);
                            }
                        }
                    }
                });
            }

            connectWebSocket() {
                if (!this.feedEnabled) return;
                
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.hostname}/ws/news/`;
                
                try {
                    this.ws = new WebSocket(wsUrl);
                    
                    this.ws.onopen = () => {
                        console.log('Live news stream connected');
                        this.updateConnectionStatus(true);
                        this.reconnectAttempts = 0;
                        this.reconnectDelay = 1000;
                    };

                    this.ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        this.handleNewsUpdate(data);
                    };

                    this.ws.onerror = (error) => {
                        console.error('Stream error:', error);
                        this.updateConnectionStatus(false);
                    };

                    this.ws.onclose = () => {
                        this.updateConnectionStatus(false);
                        if (this.feedEnabled) {
                            this.attemptReconnect();
                        }
                    };
                } catch (error) {
                    console.error('Stream connection failed:', error);
                    this.updateConnectionStatus(false);
                }
            }

            async loadInitialFeed() {
                if (!this.feedEnabled) return;
                
                try {
                    const response = await fetch('/api/news/feed?limit=30');
                    if (response.ok) {
                        const data = await response.json();
                        
                        data.articles.forEach(article => {
                            this.articles.set(article.id, article);
                        });
                        
                        this.renderFeed();
                        this.startPolling();
                    }
                } catch (error) {
                    console.error('Failed to load feed:', error);
                }
            }

            startPolling() {
                setInterval(async () => {
                    if (!this.feedEnabled) return;
                    
                    try {
                        const response = await fetch('/api/news/feed?limit=5');
                        if (response.ok) {
                            const data = await response.json();
                            data.articles.forEach(article => {
                                if (!this.articles.has(article.id)) {
                                    this.articles.set(article.id, article);
                                    this.newArticleCount++;
                                    this.updateBadge();
                                    this.addNewArticle(article);
                                }
                            });
                        }
                    } catch (error) {
                        console.error('Polling error:', error);
                    }
                }, 30000);
            }

            handleNewsUpdate(data) {
                if (data.type === 'breaking') {
                    this.autoOpenForBreaking();
                }

                if (data.article) {
                    this.articles.set(data.article.id, data.article);
                    this.newArticleCount++;
                    this.updateBadge();
                    this.addNewArticle(data.article);
                }
            }

            addNewArticle(article) {
                if (this.isMobile) {
                    // Add to mobile feed
                    const ticker = document.getElementById('mobile-news-ticker');
                    if (ticker) {
                        const newItem = this.createMobileNewsItem(article);
                        ticker.insertBefore(newItem, ticker.firstChild);
                        
                        // Limit items
                        while (ticker.children.length > 50) {
                            ticker.removeChild(ticker.lastChild);
                        }
                    }
                } else {
                    // Add to desktop ticker
                    const ticker = document.getElementById('news-ticker');
                    if (ticker) {
                        const newItem = this.createDesktopNewsItem(article);
                        ticker.insertBefore(newItem, ticker.firstChild);
                        
                        // Limit items
                        while (ticker.children.length > 50) {
                            ticker.removeChild(ticker.lastChild);
                        }
                    }
                }
            }

            updateBadge() {
                if (this.isMobile && !this.feedOpen) {
                    const badge = document.getElementById('news-badge');
                    if (badge && this.newArticleCount > 0) {
                        badge.textContent = this.newArticleCount > 99 ? '99+' : this.newArticleCount;
                        badge.classList.add('show');
                    }
                }
            }

            toggleFeed() {
                if (!this.feedEnabled) return;
                
                const feed = document.getElementById('news-feed');
                const mainContainer = document.getElementById('main-container');
                
                this.feedOpen = !this.feedOpen;
                feed.classList.toggle('open');
                
                if (!this.isMobile) {
                    mainContainer.classList.toggle('news-open');
                }
                
                if (this.feedOpen) {
                    if (this.isMobile) {
                        this.newArticleCount = 0;
                        const badge = document.getElementById('news-badge');
                        if (badge) badge.classList.remove('show');
                        this.renderMobileFeed();
                        this.setupMobileAutoScroll();
                    }
                } else {
                    if (this.isMobile) {
                        this.pauseMobileAutoScroll();
                    }
                }
            }

            autoOpenForBreaking() {
                if (!this.feedOpen) {
                    this.toggleFeed();
                }
            }

            setupFilters() {
                // Only mobile filters now
                document.querySelectorAll('.mobile-filter').forEach(filter => {
                    filter.addEventListener('click', (e) => {
                        document.querySelectorAll('.mobile-filter').forEach(f => 
                            f.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.category;
                        this.renderFeed();
                    });
                });
            }

            renderFeed() {
                if (this.isMobile) {
                    this.renderMobileFeed();
                } else {
                    this.renderDesktopFeed();
                }
            }

            renderMobileFeed() {
                const ticker = document.getElementById('mobile-news-ticker');
                if (!ticker) return;
                
                ticker.innerHTML = '';

                const sortedArticles = Array.from(this.articles.values())
                    .filter(article => {
                        if (this.currentFilter === 'all') return true;
                        if (this.currentFilter === 'breaking') return article.is_breaking;
                        return article.category?.toLowerCase() === this.currentFilter;
                    })
                    .sort((a, b) => new Date(b.published) - new Date(a.published));

                // Add articles twice for seamless scrolling
                for (let i = 0; i < 2; i++) {
                    sortedArticles.forEach(article => {
                        ticker.appendChild(this.createMobileNewsItem(article));
                    });
                }

                if (sortedArticles.length === 0) {
                    ticker.innerHTML = '<div style="text-align: center; opacity: 0.6; padding: 2rem;">Loading live news stream...</div>';
                }
            }

            createMobileNewsItem(article) {
                const item = document.createElement('div');
                item.className = article.is_breaking ? 'mobile-news-item breaking' : 'mobile-news-item';
                
                const time = new Date(article.published).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit'
                });

                item.innerHTML = `
                    ${article.is_breaking ? '<div style="display: inline-block; padding: 3px 8px; background: linear-gradient(135deg, rgba(255, 59, 48, 0.9), rgba(255, 149, 0, 0.7)); color: white; font-size: 0.6rem; font-weight: 700; border-radius: 5px; margin-bottom: 0.3rem;">BREAKING</div>' : ''}
                    <div class="mobile-news-item-title">${article.title}</div>
                    <div class="mobile-news-item-meta">
                        <span class="mobile-news-item-category">${article.category || 'General'}</span>
                        <span>${time}</span>
                        <span style="opacity: 0.7;">${article.source_name || 'Crene AI'}</span>
                    </div>
                    <div class="mobile-news-item-summary">${(article.summary || '').substring(0, 120)}...</div>
                `;

                item.onclick = () => {
                    const url = article.url?.startsWith('http') 
                        ? article.url 
                        : `https://crene.com${article.url}`;
                    window.open(url, '_blank');
                };
                
                return item;
            }

            renderDesktopFeed() {
                const ticker = document.getElementById('news-ticker');
                if (!ticker) return;
                
                ticker.innerHTML = '';

                const sortedArticles = Array.from(this.articles.values())
                    .filter(article => {
                        if (this.currentFilter === 'all') return true;
                        if (this.currentFilter === 'breaking') return article.is_breaking;
                        return article.category?.toLowerCase() === this.currentFilter;
                    })
                    .sort((a, b) => new Date(b.published) - new Date(a.published));

                // Add articles twice for seamless scrolling
                sortedArticles.forEach(article => {
                    ticker.appendChild(this.createDesktopNewsItem(article));
                });
                
                // Clone for continuous scroll
                if (sortedArticles.length > 0) {
                    sortedArticles.forEach(article => {
                        ticker.appendChild(this.createDesktopNewsItem(article));
                    });
                }

                if (sortedArticles.length === 0) {
                    ticker.innerHTML = '<div style="text-align: center; opacity: 0.6; padding: 2rem;">Loading live news stream...</div>';
                }
            }

            createDesktopNewsItem(article) {
                const item = document.createElement('div');
                item.className = article.is_breaking ? 'news-item breaking' : 'news-item';
                
                const time = new Date(article.published).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit'
                });

                item.innerHTML = `
                    ${article.is_breaking ? '<div style="display: inline-block; padding: 0.2rem 0.5rem; background: rgba(255, 59, 48, 0.8); color: white; font-size: 0.65rem; font-weight: 700; border-radius: 5px; margin-bottom: 0.5rem;">BREAKING</div>' : ''}
                    <div class="news-item-title">${article.title}</div>
                    <div class="news-item-meta">
                        <span class="news-item-category">${article.category || 'General'}</span>
                        <span>${time}</span>
                        <span>${article.source_name || 'Crene AI'}</span>
                    </div>
                    <div class="news-item-summary">${article.summary || ''}</div>
                `;

                item.onclick = () => {
                    const url = article.url?.startsWith('http') 
                        ? article.url 
                        : `https://crene.com${article.url}`;
                    window.open(url, '_blank');
                };
                
                return item;
            }

            updateConnectionStatus(connected) {
                const status = document.getElementById('news-status');
                if (!status) return;
                
                if (connected) {
                    status.textContent = 'Live stream active';
                    status.className = 'connection-status connected';
                } else {
                    status.textContent = 'Reconnecting stream...';
                    status.className = 'connection-status disconnected';
                }
            }

            attemptReconnect() {
                if (this.reconnectAttempts < this.maxReconnectAttempts && this.feedEnabled) {
                    this.reconnectAttempts++;
                    setTimeout(() => {
                        console.log(`Reconnecting... (${this.reconnectAttempts}/${this.maxReconnectAttempts})`);
                        this.connectWebSocket();
                    }, this.reconnectDelay);
                    this.reconnectDelay = Math.min(this.reconnectDelay * 2, 30000);
                }
            }

            deactivate() {
                this.feedEnabled = false;
                
                if (this.ws) {
                    this.ws.close();
                    this.ws = null;
                }
                
                if (this.feedOpen) {
                    this.toggleFeed();
                }
                
                clearInterval(this.scrollInterval);
                
                const feedContainer = document.getElementById('news-feed');
                const mobileFab = document.getElementById('mobile-news-fab');
                
                feedContainer.classList.remove('enabled');
                if (mobileFab) mobileFab.classList.remove('enabled');
                
                this.articles.clear();
                this.newArticleCount = 0;
                
                const status = document.getElementById('news-status');
                if (status) {
                    status.textContent = 'Waiting for activation...';
                    status.className = 'connection-status disconnected';
                }
            }
        }

        // Initialize
        let newsFeed = null;
        document.addEventListener('DOMContentLoaded', () => {
            newsFeed = new NewsFeedManager();
            
            window.addEventListener('resize', () => {
                const wasMobile = newsFeed.isMobile;
                newsFeed.isMobile = window.innerWidth <= 768;
                
                // Re-render if device type changed
                if (wasMobile !== newsFeed.isMobile && newsFeed.feedEnabled) {
                    newsFeed.renderFeed();
                    if (!newsFeed.isMobile) {
                        newsFeed.setupDesktopAutoScroll();
                    } else {
                        newsFeed.setupMobileAutoScroll();
                    }
                }
            });
        });

        // Global functions
        function toggleNewsFeed() {
            if (newsFeed) newsFeed.toggleFeed();
        }
        
        function toggleAutoScroll() {
            if (newsFeed && newsFeed.isMobile) {
                newsFeed.toggleMobileAutoScroll();
            }
        }

        // Camera functions
        let cameraStream = null;
        let isActive = false;
        
        async function startCamera() {
            try {
                const constraints = {
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const video = document.getElementById('camera-video');
                const placeholder = document.getElementById('camera-placeholder');
                const controls = document.getElementById('controls-overlay');
                const chat = document.getElementById('chat-overlay');
                
                video.srcObject = cameraStream;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                controls.classList.add('show');
                chat.classList.add('show');
                
                isActive = true;
                
                if (newsFeed) {
                    newsFeed.activate();
                    
                    const messageEl = document.getElementById('ai-message');
                    messageEl.textContent = newsFeed.isMobile 
                        ? 'AI Vision active! Tap the news button for live news feed.'
                        : 'AI Vision active! Live news feed enabled.';
                    
                    setTimeout(() => {
                        messageEl.textContent = 'AI insights will appear here...';
                    }, 5000);
                }
                
            } catch (error) {
                console.error('Camera failed:', error);
                alert('Camera access denied or not available');
            }
        }
        
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            
            const video = document.getElementById('camera-video');
            const placeholder = document.getElementById('camera-placeholder');
            const controls = document.getElementById('controls-overlay');
            const chat = document.getElementById('chat-overlay');
            
            video.style.display = 'none';
            placeholder.style.display = 'flex';
            controls.classList.remove('show');
            chat.classList.remove('show');
            
            isActive = false;
            
            if (newsFeed) {
                newsFeed.deactivate();
            }
        }
    </script>
</body>
</html>
