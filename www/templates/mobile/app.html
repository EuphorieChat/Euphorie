<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Euphorie 3D</title>
    
    <!-- Status bar and safe area styles -->
    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
        }
        
        body {
            padding-top: var(--safe-area-inset-top);
            padding-bottom: var(--safe-area-inset-bottom);
            padding-left: var(--safe-area-inset-left);
            padding-right: var(--safe-area-inset-right);
            margin: 0;
            overflow-x: hidden;
        }
        
        #status-panel {
            top: calc(15px + var(--safe-area-inset-top)) !important;
        }
        
        .mobile-bottom-nav {
            padding-bottom: var(--safe-area-inset-bottom) !important;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .loader {
            text-align: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <h2>Loading Euphorie...</h2>
        </div>
    </div>
    
    <script>
        // Global error handler - MUST be first!
        window.addEventListener('error', function(e) {
            console.warn('Error caught:', e.message);
            // Prevent errors from crashing the app
            if (e.message && (
                e.message.includes('triggerEvent') ||
                e.message.includes('gtag') ||
                e.message.includes('ga') ||
                e.message.includes('analytics')
            )) {
                e.preventDefault();
                e.stopPropagation();
                return true;
            }
        }, true);

        // Stub out common analytics/tracking functions BEFORE loading content
        const stubs = [
            'triggerEvent', 'gtag', 'ga', 'analytics', '_gaq',
            'fbq', 'heap', 'mixpanel', 'Intercom', 'drift',
            'dataLayer', 'clarity', 'hotjar'
        ];
        
        stubs.forEach(function(stub) {
            if (typeof window[stub] === 'undefined') {
                window[stub] = function() {
                    console.log(stub + ' (stubbed)');
                };
            }
        });

        // Also create google analytics objects that might be expected
        window.ga = window.ga || function() { console.log('ga (stubbed)'); };
        window.ga.q = window.ga.q || [];
        window._gaq = window._gaq || [];
        window.dataLayer = window.dataLayer || [];

        // CRITICAL: Apply StatusBar fix before redirecting
        async function configureStatusBar() {
            console.log('🔧 Configuring StatusBar for Android...');
            
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.StatusBar) {
                try {
                    const { StatusBar } = window.Capacitor.Plugins;
                    
                    // This is the critical fix for Android
                    await StatusBar.setOverlaysWebView({ overlay: false });
                    console.log('✅ StatusBar overlay disabled');
                    
                    // Also set style and color
                    await StatusBar.setStyle({ style: StatusBar.Style.Dark });
                    await StatusBar.setBackgroundColor({ color: '#000000' });
                    
                    // Store that we've configured the status bar
                    localStorage.setItem('statusBarConfigured', 'true');
                    
                } catch (error) {
                    console.error('❌ StatusBar configuration error:', error);
                }
            } else {
                console.log('⚠️ StatusBar plugin not available');
            }
        }

        // Updated loadApp function
        async function loadApp() {
            // Configure StatusBar first
            await configureStatusBar();
            
            // Small delay to ensure StatusBar settings are applied
            setTimeout(() => {
                // Hide loading screen
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.style.display = 'none';
                }
                
                // Now redirect to your main site
                window.location.replace('https://euphorie.com');
            }, 200);
        }

        // Wait for Capacitor to be ready, then load
        if (window.Capacitor) {
            document.addEventListener('deviceready', loadApp);
            // Fallback in case deviceready doesn't fire
            setTimeout(loadApp, 1000);
        } else {
            // If not in Capacitor environment, just redirect
            setTimeout(loadApp, 100);
        }
    </script>
</body>
</html>
