<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Euphorie 3D</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loading {
            padding: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>Loading Euphorie 3D...</h1>
        <p>Please wait while we initialize the app</p>
    </div>
    
    <!-- Include the capacitor-init.js to ensure StatusBar fix is applied -->
    <script src="capacitor-init.js"></script>
    
    <script>
        console.log('Euphorie 3D loading...');
        
        // Apply Android StatusBar fix immediately
        function applyAndroidFix() {
            console.log('Checking for Android StatusBar fix...');
            
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.StatusBar) {
                const isAndroid = /Android/i.test(navigator.userAgent);
                
                if (isAndroid) {
                    console.log('Android detected, applying StatusBar fix...');
                    
                    const { StatusBar } = window.Capacitor.Plugins;
                    
                    // This is the critical fix
                    StatusBar.setOverlaysWebView({ overlay: false })
                        .then(() => {
                            console.log('✅ StatusBar fix applied successfully');
                            
                            // Additional settings
                            StatusBar.setStyle({ style: 'DARK' });
                            StatusBar.setBackgroundColor({ color: '#000000' });
                            
                            // Store that we've fixed it
                            localStorage.setItem('androidStatusBarFixed', 'true');
                        })
                        .catch((error) => {
                            console.error('❌ StatusBar fix failed:', error);
                        });
                } else {
                    console.log('Not Android, skipping StatusBar fix');
                }
            } else {
                console.log('StatusBar plugin not available yet');
                // Retry in a moment
                setTimeout(applyAndroidFix, 100);
            }
        }
        
        // Try to apply fix as soon as possible
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', applyAndroidFix);
        } else {
            applyAndroidFix();
        }
        
        // Also try when deviceready fires
        document.addEventListener('deviceready', applyAndroidFix);
        
        // The server.url in capacitor.config.json handles the actual loading
        // This is just a fallback in case something goes wrong
        setTimeout(() => {
            if (document.querySelector('.loading')) {
                console.log('Still on loading page after 5 seconds');
                // Try applying fix again
                applyAndroidFix();
            }
        }, 5000);
    </script>
</body>
</html>
