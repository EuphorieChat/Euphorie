<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Euphorie 3D</title>
    
    <!-- Capacitor Core -->
    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loading {
            padding: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>Loading Euphorie 3D...</h1>
        <p>Please wait while we initialize the app</p>
    </div>
    
    <script>
        // Initialize Capacitor
        window.Capacitor = Capacitor;
        
        // Function to load the main app
        async function loadApp() {
            try {
                // Check if we're in a native app
                const isNative = Capacitor.isNativePlatform();
                
                if (isNative) {
                    // In native app, load from server
                    window.location.replace('https://euphorie.app/mobile/');
                } else {
                    // In browser, redirect to main site
                    window.location.replace('https://euphorie.app/');
                }
            } catch (error) {
                console.error('Error loading app:', error);
                document.querySelector('.loading').innerHTML = 
                    '<h2>Error loading app</h2><p>Please check your internet connection</p>';
            }
        }
        
        // Load app after a short delay
        setTimeout(loadApp, 1000);
    </script>
</body>
</html>
