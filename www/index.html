<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Euphorie 3D</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loading {
            padding: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>Loading Euphorie 3D...</h1>
        <p>Please wait while we initialize the app</p>
    </div>
    
    <script>
        // DO NOT include external Capacitor script - it's injected automatically
        // Since server.url is set to https://euphorie.com in config,
        // Capacitor will load that URL automatically.
        // This page is just a fallback/loading screen.
        
        console.log('Euphorie 3D loading...');
        
        // The server.url in capacitor.config.json handles the actual loading
        // This is just a fallback in case something goes wrong
        setTimeout(() => {
            if (document.querySelector('.loading')) {
                console.log('Still on loading page after 5 seconds');
            }
        }, 5000);
    </script>
</body>
</html>
